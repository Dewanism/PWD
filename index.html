<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="Images/Logo - No Text.png">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="dark-mode construction-page">
        <main class="construction-shell">
            <section class="construction-panel" aria-label="Website status">
                <img class="construction-logo" src="Images/Logo - No Text.png" alt="Promontory Web Designs mountain logo">
                <div class="construction-inner-card">
                    <p class="construction-kicker">Site Notice</p>
                    <h1>Website Under Construction</h1>
                    <p class="construction-message">Not accepting any new clients until further notice.</p>
                    <p class="construction-portfolio">
                        If you want to check out my personal portfolio, please visit
                        <a href="https://dewanism.com" target="_blank" rel="noopener noreferrer">dewanism.com</a>.
                    </p>
                </div>
            </section>
        </main>
    </body>
</html>
